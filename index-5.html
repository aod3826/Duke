<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>นิพนธ์ฟาร์ม — คลังบิลใบเสร็จ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Mitr:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { mitr:['Mitr','sans-serif'], sarabun:['Sarabun','sans-serif'] }
  }}
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --soil:#3d2b1f;--brown:#7a4f35;--tan:#c49a6c;--wheat:#f0ddb0;
  --cream:#fdf6e9;--moss:#4a6741;--leaf:#6b8f5e;--sage:#a8c49a;
  --mist:#ddeedd;--rust:#b84c2a;--amber:#d97706;
}
body{font-family:'Sarabun',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden}

/* HEADER */
.farm-header{
  background:linear-gradient(160deg,#2e1f12 0%,var(--soil) 40%,#3a2518 100%);
  position:relative;overflow:hidden;
}
.farm-header::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 50% at 15% 55%,rgba(106,143,94,.2) 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 82% 25%,rgba(196,154,108,.13) 0%,transparent 60%);
}
.farm-header::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(108deg,transparent,transparent 22px,rgba(255,255,255,.015) 22px,rgba(255,255,255,.015) 23px);
}
.brand-title{font-family:'Mitr',sans-serif;font-weight:700;color:var(--wheat);letter-spacing:.04em;text-shadow:0 2px 14px rgba(0,0,0,.5)}

/* TABS */
.tab-btn{font-family:'Mitr',sans-serif;font-weight:500;padding:9px 22px;border-radius:8px 8px 0 0;cursor:pointer;border:none;font-size:.83rem;color:var(--tan);background:transparent;transition:all .18s}
.tab-btn.active{background:var(--cream);color:var(--moss);font-weight:600}
.tab-btn:not(.active):hover{background:rgba(255,255,255,.09);color:var(--wheat)}

/* CALENDAR STRIP */
.cal-strip{background:#fffdf7;border-bottom:2.5px solid var(--wheat);position:sticky;top:0;z-index:30;box-shadow:0 3px 14px rgba(61,43,31,.09)}

.month-btn{font-family:'Mitr',sans-serif;background:none;border:1.5px solid transparent;border-radius:20px;padding:4px 13px;font-size:.78rem;cursor:pointer;color:var(--brown);transition:all .14s;white-space:nowrap}
.month-btn:hover{border-color:var(--sage);background:var(--mist)}
.month-btn.active{background:var(--moss);color:#fff;border-color:var(--moss);font-weight:600}

.date-chips{display:flex;gap:6px;overflow-x:auto;padding:7px 0 3px;scrollbar-width:none}
.date-chips::-webkit-scrollbar{display:none}

.date-chip{flex-shrink:0;width:44px;text-align:center;border-radius:10px;padding:5px 2px 5px;cursor:pointer;border:1.5px solid transparent;transition:all .14s;background:#f7f2e8}
.date-chip:hover{background:var(--mist);border-color:var(--sage)}
.date-chip.active{background:var(--leaf);border-color:var(--moss)}
.date-chip.has-data{position:relative}
.date-chip.has-data::after{content:'';display:block;width:5px;height:5px;background:var(--rust);border-radius:50%;margin:2px auto 0}
.date-chip.active.has-data::after{background:rgba(255,255,255,.75)}
.chip-day{font-size:.58rem;color:#aaa;line-height:1}
.chip-num{font-size:.98rem;font-weight:600;line-height:1.3;color:var(--soil)}
.date-chip.active .chip-day{color:rgba(255,255,255,.7)}
.date-chip.active .chip-num{color:#fff}
.date-chip.all-chip{width:auto;padding:5px 12px;font-family:'Mitr',sans-serif;font-size:.76rem;font-weight:500}

/* SUMMARY BAR */
.sum-bar{background:linear-gradient(135deg,var(--moss) 0%,#305228 100%);border-radius:12px;box-shadow:0 4px 18px rgba(74,103,65,.28)}

/* BILL CARD */
.bill-card{background:#fff;border-radius:10px;border:1px solid #ede6d8;overflow:hidden;box-shadow:0 1px 4px rgba(61,43,31,.06),0 4px 14px rgba(61,43,31,.05);transition:transform .17s,box-shadow .17s;cursor:pointer}
.bill-card:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(61,43,31,.14)}
.card-stripe{height:4px;background:linear-gradient(90deg,var(--moss),var(--leaf),var(--tan))}
.amount-tag{background:var(--soil);color:var(--wheat);font-family:'Mitr',sans-serif;font-size:.78rem;font-weight:600;padding:2px 9px;border-radius:20px}
.date-tag{background:var(--mist);color:var(--moss);font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:500}
.no-img-bg{background:linear-gradient(135deg,#f0ead8,#e8e0cc);display:flex;align-items:center;justify-content:center}

/* FORM */
.form-card{background:#fff;border:1px solid #ede6d8;border-radius:12px;box-shadow:0 2px 12px rgba(61,43,31,.07)}
.fi{background:#fdf9f3;border:1.5px solid #ddd0b8;border-radius:7px;padding:9px 12px;width:100%;font-family:'Sarabun',sans-serif;font-size:.9rem;color:var(--soil);transition:border-color .15s,box-shadow .15s}
.fi:focus{outline:none;border-color:var(--leaf);box-shadow:0 0 0 3px rgba(107,143,94,.15);background:#fff}
label.fl{display:block;font-size:.72rem;font-weight:600;color:var(--brown);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.btn-primary{background:linear-gradient(135deg,var(--moss),#305228);color:#fff;font-family:'Mitr',sans-serif;font-weight:600;font-size:.88rem;padding:10px 28px;border-radius:8px;border:none;cursor:pointer;box-shadow:0 3px 10px rgba(74,103,65,.28);transition:all .14s;letter-spacing:.03em}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(1px)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.upload-zone{border:2px dashed #ccc5b0;border-radius:8px;background:repeating-linear-gradient(45deg,#fdf9f3,#fdf9f3 8px,#f5f0e4 8px,#f5f0e4 16px);padding:18px;text-align:center;cursor:pointer;transition:all .14s}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--leaf);background:repeating-linear-gradient(45deg,#f3fbf0,#f3fbf0 8px,#e8f5e5 8px,#e8f5e5 16px)}

/* LIGHTBOX */
#lightbox{backdrop-filter:blur(8px) brightness(.5);-webkit-backdrop-filter:blur(8px) brightness(.5)}
.lb-panel{background:#fff;border-radius:14px;overflow:hidden;max-width:460px;width:94vw;box-shadow:0 24px 64px rgba(0,0,0,.4);animation:lbIn .22s cubic-bezier(.34,1.56,.64,1) both}
@keyframes lbIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.lb-img-wrap{background:#111;position:relative}
.lb-img-wrap img{width:100%;max-height:50vh;object-fit:contain;display:block}

.btn-action{font-family:'Mitr',sans-serif;font-size:.78rem;font-weight:500;padding:7px 13px;border-radius:7px;cursor:pointer;transition:all .13s;border:1.5px solid}
.btn-share-action{background:#f0f9f0;color:var(--moss);border-color:var(--sage)}
.btn-share-action:hover{background:var(--mist)}
.btn-del-action{background:#fff0ee;color:var(--rust);border-color:#f5c8be}
.btn-del-action:hover{background:#ffe5e0}

/* SPINNER */
.spin{width:30px;height:30px;border:3px solid var(--wheat);border-top-color:var(--moss);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);z-index:9999;background:var(--soil);color:var(--wheat);font-family:'Mitr',sans-serif;font-size:.83rem;padding:10px 24px;border-radius:24px;box-shadow:0 6px 24px rgba(0,0,0,.25);transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .28s;opacity:0;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* FADE */
.fade-in{animation:fin .3s ease both}
@keyframes fin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--tan);border-radius:3px}

.empty-state{text-align:center;padding:48px 16px}
</style>
</head>
<body>

<!-- ======= HEADER ======= -->
<header class="farm-header">
<div style="position:relative;z-index:10;max-width:640px;margin:0 auto;padding:20px 16px 0">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--leaf),var(--moss));border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3);flex-shrink:0">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div>
        <h1 class="brand-title" style="font-size:1.6rem;line-height:1">นิพนธ์ฟาร์ม</h1>
        <p style="color:var(--tan);font-size:.7rem;margin-top:3px;letter-spacing:.06em">คลังบิลใบเสร็จ · Receipt Archive</p>
      </div>
    </div>
    <div id="hdr-stats" class="hidden" style="text-align:right">
      <p style="color:var(--sage);font-size:.68rem">รายจ่ายเดือนนี้</p>
      <p id="hdr-total" style="color:var(--wheat);font-family:'Mitr',sans-serif;font-weight:700;font-size:1.05rem">฿0</p>
    </div>
  </div>
  <div style="display:flex;gap:4px">
    <button class="tab-btn active" id="tab-browse" onclick="switchTab('browse')">🗂 ดูบิล</button>
    <button class="tab-btn" id="tab-add" onclick="switchTab('add')">➕ เพิ่มบิล</button>
  </div>
</div>
</header>

<!-- ======= CALENDAR STRIP ======= -->
<div id="cal-strip" class="cal-strip">
<div style="max-width:640px;margin:0 auto;padding:10px 14px 8px">
  <!-- Month row -->
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
    <button onclick="prevYear()" style="background:none;border:none;cursor:pointer;color:var(--brown);font-size:1rem;padding:2px 5px;flex-shrink:0">«</button>
    <div id="month-strip" style="display:flex;gap:5px;overflow-x:auto;flex:1;scrollbar-width:none"></div>
    <button onclick="nextYear()" style="background:none;border:none;cursor:pointer;color:var(--brown);font-size:1rem;padding:2px 5px;flex-shrink:0">»</button>
    <span id="year-label" style="font-family:'Mitr',sans-serif;font-weight:600;color:var(--soil);font-size:.82rem;white-space:nowrap;flex-shrink:0"></span>
  </div>
  <!-- Date row -->
  <div id="date-chips" class="date-chips"></div>
</div>
</div>

<!-- ======= MAIN ======= -->
<main style="max-width:640px;margin:0 auto;padding:16px 14px 32px">

  <!-- ===== BROWSE ===== -->
  <div id="view-browse">

    <!-- Summary -->
    <div id="sum-bar" class="sum-bar hidden" style="color:white;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <p style="font-size:.7rem;opacity:.8" id="sum-label">รายจ่ายทั้งหมด</p>
        <p style="font-family:'Mitr',sans-serif;font-weight:700;font-size:1.35rem" id="sum-total">฿0</p>
      </div>
      <div style="text-align:right">
        <p style="font-size:.7rem;opacity:.8">จำนวนบิล</p>
        <p style="font-family:'Mitr',sans-serif;font-weight:700;font-size:1.35rem" id="sum-count">0</p>
      </div>
    </div>

    <!-- Search -->
    <div style="position:relative;margin-bottom:12px">
      <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#aaa;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" id="s-store" placeholder="ค้นหาชื่อร้านค้า..." oninput="applyFilters()" class="fi" style="padding-left:32px"/>
    </div>

    <!-- States -->
    <div id="loading-state" style="display:flex;flex-direction:column;align-items:center;padding:56px 0;gap:12px">
      <div class="spin"></div>
      <p style="color:var(--tan);font-size:.83rem">กำลังโหลดบิล...</p>
    </div>
    <div id="error-state" class="empty-state hidden">
      <div style="font-size:3rem;margin-bottom:10px">⚠️</div>
      <p style="color:var(--soil);font-weight:600" id="error-msg">เกิดข้อผิดพลาด</p>
      <button onclick="loadReceipts()" style="margin-top:12px;color:var(--rust);font-size:.82rem;text-decoration:underline;background:none;border:none;cursor:pointer">ลองใหม่</button>
    </div>
    <div id="empty-state" class="empty-state hidden">
      <div style="font-size:3.5rem;margin-bottom:10px">🌿</div>
      <p style="color:var(--brown);font-size:.88rem" id="empty-msg">ยังไม่มีบิล</p>
    </div>

    <!-- Grid -->
    <div id="receipts-grid" class="hidden" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px"></div>
  </div>

  <!-- ===== ADD ===== -->
  <div id="view-add" class="hidden">
    <div class="form-card" style="padding:20px">
      <h2 style="font-family:'Mitr',sans-serif;font-weight:600;font-size:.97rem;color:var(--soil);margin-bottom:16px;display:flex;align-items:center;gap:8px">
        <span style="width:28px;height:28px;background:var(--moss);color:white;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.75rem">✎</span>
        บันทึกบิลใหม่
      </h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <label class="fl">วันที่</label>
          <input type="date" id="f-date" class="fi"/>
        </div>
        <div>
          <label class="fl">ยอดเงิน (บาท)</label>
          <input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0" class="fi"/>
        </div>
        <div style="grid-column:1/-1">
          <label class="fl">ร้านค้า / ผู้รับเงิน</label>
          <input type="text" id="f-store" placeholder="ชื่อร้านค้า" class="fi"/>
        </div>
        <div style="grid-column:1/-1">
          <label class="fl">รายละเอียด</label>
          <input type="text" id="f-desc" placeholder="รายการสินค้า / บริการ" class="fi"/>
        </div>
        <div style="grid-column:1/-1">
          <label class="fl">รูปบิล (ไม่บังคับ)</label>
          <div id="upload-zone" class="upload-zone"
            onclick="document.getElementById('f-image').click()"
            ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">
            <input type="file" id="f-image" accept="image/*" class="hidden" onchange="handleFileSelect(event)"/>
            <div id="up-ph">
              <div style="font-size:1.8rem;margin-bottom:5px">📸</div>
              <p style="font-size:.78rem;color:var(--tan)">คลิกหรือลากวางรูปที่นี่</p>
              <p style="font-size:.68rem;color:#bbb;margin-top:2px">JPG, PNG (สูงสุด 10MB)</p>
            </div>
            <div id="up-prev" class="hidden">
              <img id="preview-img" style="height:72px;margin:0 auto;border-radius:6px;object-fit:cover"/>
              <p id="preview-name" style="font-size:.7rem;color:var(--tan);margin-top:5px"></p>
              <p style="font-size:.68rem;color:var(--leaf);margin-top:2px">✓ พร้อมอัปโหลด</p>
            </div>
          </div>
        </div>
      </div>
      <div id="form-error" class="hidden" style="margin-top:10px;padding:9px 12px;background:#fff3f0;border:1px solid #f5cdc6;border-radius:7px;color:var(--rust);font-size:.8rem"></div>
      <div style="margin-top:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <button id="btn-save" onclick="saveReceipt()" class="btn-primary">💾 บันทึกบิล</button>
        <button onclick="resetForm()" style="background:none;border:none;cursor:pointer;color:var(--tan);font-size:.8rem;text-decoration:underline">ล้างฟอร์ม</button>
        <div id="save-spinner" class="hidden spin" style="width:22px;height:22px;border-width:2px"></div>
      </div>
    </div>
  </div>

</main>

<!-- ======= LIGHTBOX ======= -->
<div id="lightbox" class="hidden" style="position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:14px" onclick="closeLightbox(event)">
  <div class="lb-panel" onclick="event.stopPropagation()">
    <div class="lb-img-wrap" id="lb-img-wrap"></div>
    <div style="padding:15px 17px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px">
        <div style="flex:1;min-width:0">
          <p style="font-family:'Mitr',sans-serif;font-weight:600;font-size:.97rem;color:var(--soil)" id="lb-store">—</p>
          <p style="font-size:.78rem;color:var(--tan);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="lb-desc">—</p>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <p style="font-family:'Mitr',sans-serif;font-weight:700;font-size:1.15rem;color:var(--moss)" id="lb-amount">฿0</p>
          <p style="font-size:.72rem;color:var(--tan)" id="lb-date">—</p>
        </div>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button class="btn-action btn-share-action" onclick="shareReceipt()">📤 แชร์</button>
        <button class="btn-action btn-share-action" onclick="copyReceiptText()">📋 คัดลอก</button>
        <button class="btn-action btn-share-action" id="lb-dl-btn" onclick="downloadImage()">⬇️ รูป</button>
        <button class="btn-action btn-del-action" onclick="deleteReceipt()">🗑 ซ่อน</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ============================================================
// ⚙️ เปลี่ยน URL นี้หลัง Deploy Google Apps Script
// ============================================================
const API_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";
// ============================================================

let allReceipts = [], filteredReceipts = [];
let selYear = new Date().getFullYear(), selMonth = new Date().getMonth(), selDate = null;
let currentLB = null;
let imgB64 = '', imgName = '', imgMime = '';

const MT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const DT = ['อา','จ','อ','พ','พฤ','ศ','ส'];

document.addEventListener('DOMContentLoaded', () => { setDefDate(); buildCal(); loadReceipts(); });

// ===== TAB =====
function switchTab(t) {
  document.getElementById('view-browse').classList.toggle('hidden', t!=='browse');
  document.getElementById('view-add').classList.toggle('hidden', t!=='add');
  document.getElementById('cal-strip').classList.toggle('hidden', t!=='browse');
  document.getElementById('tab-browse').classList.toggle('active', t==='browse');
  document.getElementById('tab-add').classList.toggle('active', t==='add');
}

// ===== CALENDAR =====
function buildCal() {
  document.getElementById('year-label').textContent = (selYear+543).toString();

  // Months
  const ms = document.getElementById('month-strip');
  ms.innerHTML = '';
  for (let m=0;m<12;m++) {
    const b = document.createElement('button');
    b.className = 'month-btn'+(m===selMonth?' active':'');
    b.textContent = MT[m];
    b.onclick = ()=>{ selMonth=m; selDate=null; buildCal(); applyFilters(); scrollAct(ms); };
    ms.appendChild(b);
  }
  setTimeout(()=>scrollAct(ms), 50);

  // Dates
  const dc = document.getElementById('date-chips');
  dc.innerHTML = '';
  const allC = document.createElement('div');
  allC.className = 'date-chip all-chip'+(!selDate?' active':'');
  allC.textContent = 'ทั้งเดือน';
  allC.onclick = ()=>{ selDate=null; buildCal(); applyFilters(); };
  dc.appendChild(allC);

  const days = new Date(selYear,selMonth+1,0).getDate();
  const dateSet = new Set(allReceipts.map(r=>r.date));
  for (let d=1;d<=days;d++) {
    const ds = `${selYear}-${String(selMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(selYear,selMonth,d).getDay();
    const chip = document.createElement('div');
    const isA = selDate===ds, hasD = dateSet.has(ds);
    chip.className = 'date-chip'+(isA?' active':'')+(hasD?' has-data':'');
    chip.innerHTML = `<div class="chip-day">${DT[dow]}</div><div class="chip-num">${d}</div>`;
    chip.onclick = ()=>{ selDate=(selDate===ds)?null:ds; buildCal(); applyFilters(); };
    dc.appendChild(chip);
    if (isA) setTimeout(()=>chip.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}),60);
  }
}
function scrollAct(el) { const a=el.querySelector('.active'); if(a) a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
function prevYear() { selYear--; selDate=null; buildCal(); applyFilters(); }
function nextYear() { selYear++; selDate=null; buildCal(); applyFilters(); }

// ===== LOAD =====
async function loadReceipts() {
  showState('loading');
  try {
    const res = await fetch(`${API_URL}?action=list`,{method:'GET',mode:'cors'});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error||'API Error');
    allReceipts = json.data||[];
    buildCal();
    applyFilters();
    updateHdrStats();
  } catch(e) {
    showState('error');
    document.getElementById('error-msg').textContent = 'โหลดข้อมูลไม่สำเร็จ: '+e.message;
  }
}

// ===== FILTER =====
function applyFilters() {
  const q = document.getElementById('s-store').value.trim().toLowerCase();
  const ms = `${selYear}-${String(selMonth+1).padStart(2,'0')}`;
  filteredReceipts = allReceipts.filter(r => {
    return (!q||r.store.toLowerCase().includes(q)) && r.date.startsWith(ms) && (!selDate||r.date===selDate);
  });
  renderReceipts();
  updateSummary();
}

function updateHdrStats() {
  const now = new Date();
  const ms = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const tot = allReceipts.filter(r=>r.date.startsWith(ms)).reduce((s,r)=>s+r.amount,0);
  document.getElementById('hdr-total').textContent = '฿'+fmt(tot);
  document.getElementById('hdr-stats').classList.remove('hidden');
}

function updateSummary() {
  const cnt = filteredReceipts.length;
  const tot = filteredReceipts.reduce((s,r)=>s+r.amount,0);
  const bar = document.getElementById('sum-bar');
  if (!cnt) { bar.style.display='none'; bar.classList.add('hidden'); return; }
  bar.style.display='flex'; bar.classList.remove('hidden');
  const lbl = selDate
    ? `วันที่ ${parseInt(selDate.split('-')[2])} ${MT[selMonth]}`
    : `${MT[selMonth]} ${selYear+543}`;
  document.getElementById('sum-label').textContent = 'รายจ่าย '+lbl;
  document.getElementById('sum-total').textContent = '฿'+fmt(tot);
  document.getElementById('sum-count').textContent = cnt+' บิล';
}

// ===== RENDER =====
function renderReceipts() {
  const grid = document.getElementById('receipts-grid');
  if (!filteredReceipts.length) {
    showState('empty');
    document.getElementById('empty-msg').textContent = !allReceipts.length
      ? 'ยังไม่มีบิล — แตะ ➕ เพิ่มบิล เพื่อเริ่มต้น'
      : 'ไม่พบบิลในช่วงที่เลือก';
    return;
  }
  showState('grid');
  grid.innerHTML = '';
  filteredReceipts.forEach((r,i) => {
    const card = document.createElement('div');
    card.className = 'bill-card fade-in';
    card.style.animationDelay = Math.min(i*.04,.25)+'s';
    card.onclick = ()=>openLB(r);
    const hasImg = r.imageURL?.trim();
    const imgPart = hasImg
      ? `<img src="${esc(r.imageURL)}" alt="บิล" style="width:100%;height:108px;object-fit:cover" onerror="this.parentElement.innerHTML='<div class=\\'no-img-bg\\'style=\\'height:108px;\\'><span style=\\'font-size:2rem;\\'>🧾</span></div>'">`
      : `<div class="no-img-bg" style="height:108px"><span style="font-size:2rem">🧾</span></div>`;
    card.innerHTML = `<div class="card-stripe"></div>${imgPart}
      <div style="padding:9px 10px 11px">
        <p style="font-size:.76rem;font-weight:600;color:var(--soil);margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35">${esc(r.store)}</p>
        ${r.description?`<p style="font-size:.68rem;color:var(--tan);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.description)}</p>`:''}
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:3px">
          <span class="date-tag">${fmtS(r.date)}</span>
          <span class="amount-tag">฿${fmt(r.amount)}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function showState(s) {
  document.getElementById('loading-state').style.display = s==='loading'?'flex':'none';
  document.getElementById('error-state').classList.toggle('hidden',s!=='error');
  document.getElementById('empty-state').classList.toggle('hidden',s!=='empty');
  const g = document.getElementById('receipts-grid');
  if (s==='grid') { g.classList.remove('hidden'); g.style.display='grid'; }
  else            { g.classList.add('hidden'); g.style.display='none'; }
}

// ===== LIGHTBOX =====
function openLB(r) {
  currentLB = r;
  const wrap = document.getElementById('lb-img-wrap');
  if (r.imageURL?.trim()) {
    wrap.innerHTML = `<img src="${esc(r.imageURL)}" alt="บิล" style="width:100%;max-height:50vh;object-fit:contain;display:block;background:#111"
      onerror="this.parentElement.innerHTML='<div style=\\'height:140px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;\\'><span style=\\'color:#555;font-size:.83rem;\\'>ไม่พบรูปภาพ</span></div>'">
      <button onclick="closeLightbox()" style="position:absolute;top:9px;right:9px;background:rgba(0,0,0,.55);color:white;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center">✕</button>`;
    document.getElementById('lb-dl-btn').style.display='';
  } else {
    wrap.innerHTML = `<div style="height:90px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;font-size:2.5rem">🧾</div>
      <button onclick="closeLightbox()" style="position:absolute;top:7px;right:7px;background:rgba(0,0,0,.2);color:white;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer">✕</button>`;
    document.getElementById('lb-dl-btn').style.display='none';
  }
  document.getElementById('lb-store').textContent  = r.store||'—';
  document.getElementById('lb-desc').textContent   = r.description||'—';
  document.getElementById('lb-amount').textContent = '฿'+fmt(r.amount);
  document.getElementById('lb-date').textContent   = fmtF(r.date);
  const lb = document.getElementById('lightbox');
  lb.classList.remove('hidden'); lb.style.display='flex';
  document.body.style.overflow='hidden';
}
function closeLightbox(e) {
  if (e && e.target!==document.getElementById('lightbox')) return;
  document.getElementById('lightbox').classList.add('hidden');
  document.getElementById('lightbox').style.display='none';
  document.body.style.overflow=''; currentLB=null;
}

// ===== SHARE =====
async function shareReceipt() {
  if (!currentLB) return;
  const txt = buildTxt(currentLB);
  if (navigator.share) {
    try { await navigator.share({title:`บิล — ${currentLB.store}`,text:txt}); showToast('แชร์สำเร็จ ✓'); }
    catch(e) { if(e.name!=='AbortError') cpyTxt(txt); }
  } else cpyTxt(txt);
}
function copyReceiptText() { if(currentLB) cpyTxt(buildTxt(currentLB)); }
function buildTxt(r) {
  return `🧾 บิลใบเสร็จ — นิพนธ์ฟาร์ม\n📅 วันที่: ${fmtF(r.date)}\n🏪 ร้านค้า: ${r.store}\n`+
         (r.description?`📝 รายละเอียด: ${r.description}\n`:'')+
         `💰 ยอดเงิน: ฿${fmt(r.amount)}`+
         (r.imageURL?`\n🖼 รูปบิล: ${r.imageURL}`:'');
}
function cpyTxt(t) { navigator.clipboard.writeText(t).then(()=>showToast('คัดลอกแล้ว ✓')); }
function downloadImage() {
  if (!currentLB?.imageURL) return;
  const a=document.createElement('a');
  a.href=currentLB.imageURL; a.download=`receipt_${currentLB.date}_${currentLB.store}.jpg`;
  a.target='_blank'; a.click(); showToast('กำลังบันทึกรูป...');
}

// ===== DELETE =====
async function deleteReceipt() {
  if (!currentLB||!confirm('ซ่อนบิลนี้ออกจากรายการ?')) return;
  try {
    const res=await fetch(API_URL,{method:'POST',mode:'cors',body:JSON.stringify({action:'delete',id:currentLB.id})});
    const json=await res.json();
    if (!json.success) throw new Error(json.error);
    allReceipts=allReceipts.filter(r=>r.id!==currentLB.id);
    closeLightbox(); buildCal(); applyFilters(); showToast('ซ่อนบิลแล้ว');
  } catch(e) { showToast('เกิดข้อผิดพลาด: '+e.message); }
}

// ===== SAVE =====
async function saveReceipt() {
  hideErr();
  const date=document.getElementById('f-date').value.trim();
  const store=document.getElementById('f-store').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const amount=document.getElementById('f-amount').value.trim();
  if(!date){showErr('กรุณาเลือกวันที่');return}
  if(!store){showErr('กรุณาใส่ชื่อร้านค้า');return}
  if(!amount||isNaN(parseFloat(amount))){showErr('กรุณาใส่ยอดเงิน');return}
  const btn=document.getElementById('btn-save');
  btn.disabled=true; document.getElementById('save-spinner').classList.remove('hidden');
  try {
    const res=await fetch(API_URL,{method:'POST',mode:'cors',body:JSON.stringify({
      action:'save',date,store,description:desc,amount:parseFloat(amount),
      imageBase64:imgB64||'',imageName:imgName||'',imageMimeType:imgMime||'image/jpeg'
    })});
    const json=await res.json();
    if(!json.success) throw new Error(json.error||'บันทึกไม่สำเร็จ');
    showToast('บันทึกสำเร็จ ✓');
    resetForm();
    await loadReceipts();
    selYear=parseInt(date.split('-')[0]); selMonth=parseInt(date.split('-')[1])-1; selDate=date;
    buildCal(); applyFilters(); switchTab('browse');
  } catch(e) { showErr('เกิดข้อผิดพลาด: '+e.message); }
  finally { btn.disabled=false; document.getElementById('save-spinner').classList.add('hidden'); }
}
function resetForm() {
  ['f-store','f-desc','f-amount','f-image'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  imgB64=imgName=imgMime='';
  document.getElementById('up-ph').classList.remove('hidden');
  document.getElementById('up-prev').classList.add('hidden');
  hideErr(); setDefDate();
}
function setDefDate(){ document.getElementById('f-date').value=new Date().toISOString().split('T')[0]; }

// ===== UPLOAD =====
function handleFileSelect(e){if(e.target.files[0])procFile(e.target.files[0]);}
function handleDragOver(e){e.preventDefault();document.getElementById('upload-zone').classList.add('drag-over');}
function handleDragLeave(){document.getElementById('upload-zone').classList.remove('drag-over');}
function handleDrop(e){e.preventDefault();document.getElementById('upload-zone').classList.remove('drag-over');if(e.dataTransfer.files[0]?.type.startsWith('image/'))procFile(e.dataTransfer.files[0]);}
function procFile(f){
  if(f.size>10*1024*1024){showErr('ไฟล์ใหญ่เกินไป (สูงสุด 10MB)');return;}
  imgName=f.name;imgMime=f.type;
  const r=new FileReader();
  r.onload=e=>{imgB64=e.target.result;
    document.getElementById('up-ph').classList.add('hidden');
    document.getElementById('up-prev').classList.remove('hidden');
    document.getElementById('preview-img').src=imgB64;
    document.getElementById('preview-name').textContent=f.name;};
  r.readAsDataURL(f);
}

// ===== HELPERS =====
function showErr(m){const e=document.getElementById('form-error');e.textContent=m;e.classList.remove('hidden');}
function hideErr(){document.getElementById('form-error').classList.add('hidden');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function fmt(n){return Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtS(s){if(!s)return'—';try{const[y,m,d]=s.split('-');return`${parseInt(d)} ${MT[parseInt(m)-1]}`;}catch{return s;}}
function fmtF(s){if(!s)return'—';try{const[y,m,d]=s.split('-');return`${parseInt(d)} ${MT[parseInt(m)-1]} ${parseInt(y)+543}`;}catch{return s;}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
</script>
